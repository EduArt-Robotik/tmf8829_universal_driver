name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - cc: gcc
            cxx: g++
            include_default_image: "OFF"
            build_type: Release
            sanitizers: ""
          - cc: gcc
            cxx: g++
            include_default_image: "ON"
            build_type: Release
            sanitizers: ""
          - cc: clang
            cxx: clang++
            include_default_image: "ON"
            build_type: Release
            sanitizers: ""
          - cc: gcc
            cxx: g++
            include_default_image: "ON"
            build_type: Debug
            sanitizers: "-fsanitize=address,undefined -fno-omit-frame-pointer"

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DCMAKE_C_FLAGS="${{ matrix.sanitizers }}"
          -DCMAKE_CXX_FLAGS="${{ matrix.sanitizers }}"
          -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.sanitizers }}"
          -DTMF8829_INCLUDE_DEFAULT_IMAGE=${{ matrix.include_default_image }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
